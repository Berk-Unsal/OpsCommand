name: OpsCommand CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the code
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (The builder)
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Docker Hub (Using the secrets you just added)
      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build and Push the Backend
      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true # <--- This is the big change!
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/opscommand-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/opscommand-backend:${{ github.sha }}

      # 5. Build and Push the Frontend (Bonus: We are doing both at once!)
      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/opscommand-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/opscommand-frontend:${{ github.sha }}