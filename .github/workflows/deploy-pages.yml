name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Pages Source Type
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const buildType = response?.data?.build_type || 'unknown';
              core.info(`Detected Pages build_type: ${buildType}`);
              core.setOutput('build_type', buildType);
            } catch (error) {
              core.warning(`Could not read Pages configuration: ${error.message}`);
              core.setOutput('build_type', 'missing');
            }

      - name: Setup Pages
        if: steps.pages.outputs.build_type == 'workflow'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.pages.outputs.build_type == 'workflow'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.pages.outputs.build_type == 'workflow'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Skip Deploy (Pages not set to GitHub Actions)
        if: steps.pages.outputs.build_type != 'workflow'
        run: |
          echo "Skipping deploy-pages workflow."
          echo "Current Pages source is '${{ steps.pages.outputs.build_type }}'."
          echo "Use Settings -> Pages -> Source -> GitHub Actions to enable this workflow-based deploy."
